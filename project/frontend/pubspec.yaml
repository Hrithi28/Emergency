name: crisissync
description: AI-powered hospitality emergency coordination platform
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_database: ^11.0.1
  cloud_firestore: ^5.0.1
  firebase_messaging: ^15.0.1
  firebase_analytics: ^11.0.1

  # Google APIs
  google_maps_flutter: ^2.6.1
  google_generative_ai: ^0.4.3
  googleapis: ^13.1.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3
  retrofit: ^4.1.0

  # UI
  go_router: ^14.1.4
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  lottie: ^3.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.3.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.3
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
